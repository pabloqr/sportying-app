  #---------------------------------------------------------------------------------------------------------------------
  # TESTS - Ejecutar en paralelo
  #---------------------------------------------------------------------------------------------------------------------
  validate:
    name: Analyze and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      # TODO: tests unitarios
      # - name: Run unit tests with coverage
      #   run: flutter test --coverage test/unit/

      # TODO: tests de widgets
      # - name: Run widget tests
      #   run: flutter test test/widget/

      # TODO: tests de integración
      # - name: Run integration tests
      #   run: flutter test test/integration/

  smoke-web:
    name: Smoke web build
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web smoke
        run: flutter build web --release

  smoke-android:
    name: Smoke Android build
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android smoke
        run: flutter build apk --debug

  #---------------------------------------------------------------------------------------------------------------------
  # RESULT - Punto de control único para branch protection rules
  #---------------------------------------------------------------------------------------------------------------------
  smoke-result:
    name: Smoke tests result
    runs-on: ubuntu-latest
    needs: [smoke-web, smoke-android]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.smoke-web.result }}" != "success" || "${{ needs.smoke-android.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
