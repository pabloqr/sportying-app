name: CI Development

on:
  workflow_dispatch:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  #---------------------------------------------------------------------------------------------------------------------
  # SECURITY - Ejecutar en paralelo
  #---------------------------------------------------------------------------------------------------------------------
  snyk:
    name: Snyk Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk test
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=pubspec.yaml --sarif-file-output=snyk-oss.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-oss.sarif
          category: snyk-oss

  #---------------------------------------------------------------------------------------------------------------------
  # TESTS - Ejecutar en paralelo
  #---------------------------------------------------------------------------------------------------------------------
  quality:
    name: Analyze and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Flutter analyze
        run: flutter analyze

      # TODO: tests unitarios
      # - name: Run unit tests with coverage
      #   run: flutter test --coverage test/unit/

      # TODO: tests de widgets
      # - name: Run widget tests
      #   run: flutter test test/widget/

      # TODO: tests de integración
      # - name: Run integration tests
      #   run: flutter test test/integration/
