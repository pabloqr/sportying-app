name: CD Production

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  #---------------------------------------------------------------------------------------------------------------------
  # BUILD - Ejecutar al crear un tag de versión
  #---------------------------------------------------------------------------------------------------------------------
  validate:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --set-exit-if-changed $(git ls-files '*.dart' ':!:**/*.g.dart' ':!:**/*.freezed.dart')

      - name: Analyze
        run: flutter analyze

  build:
    name: Build and upload app
    environment: production
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web app
        run: flutter build web --release

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf web.tar.gz -C build web
          gh release upload ${{ github.ref_name }} web.tar.gz
          gh release upload ${{ github.ref_name }} build/app/outputs/flutter-apk/app-debug.apk
