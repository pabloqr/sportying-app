name: CD Development

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: development
  cancel-in-progress: true

jobs:
  #---------------------------------------------------------------------------------------------------------------------
  # BUILD - Ejecutar al crear un tag de versión
  #---------------------------------------------------------------------------------------------------------------------
  validate:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --set-exit-if-changed $(git ls-files '*.dart' ':!:**/*.g.dart' ':!:**/*.freezed.dart')

      - name: Analyze
        run: flutter analyze

  build:
    name: Build app
    environment: development
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web app
        run: flutter build web --release

      - name: Upload web app artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dev
          path: build/web

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-dev
          path: build/app/outputs/flutter-apk/app-debug.apk
